name: saralpooja
description: Saral Pooja Android app for pooja booking, chat, shop, wallet, and admin workflows.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0
  file_picker: ^10.3.3
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.2
  google_fonts: ^6.2.1
  razorpay_flutter: ^1.4.1
  supabase_flutter: ^2.3.4
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
